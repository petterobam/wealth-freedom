name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm -F @wealth-freedom/shared build

      - name: Build desktop (type-check via electron-vite)
        run: pnpm -F @wealth-freedom/desktop build:vite
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
