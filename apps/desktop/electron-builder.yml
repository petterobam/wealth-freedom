appId: com.wealth-freedom.app
productName: 财富自由之路

directories:
  buildResources: build
  output: release

files:
  - dist/**/*
  - out/**/*
  - package.json

mac:
  category: public.app-category.finance
  identity: null
  target:
    - target: dmg
      arch:
        - arm64
  icon: build/icon.icns

# 统一产物文件名（避免中文 productName 导致文件名异常）
artifactName: wealth-freedom-${version}-${arch}.${ext}

win:
  executableName: wealth-freedom
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/icon.ico

linux:
  target:
    - AppImage
    - deb
  category: Office
  icon: build/icon.png

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true

# CI 中由 publish job 统一上传
# --publish never 在 CI 命令中指定
